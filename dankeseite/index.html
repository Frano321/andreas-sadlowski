<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vielen Dank für Deine Bestellung! | Andreas Sadlowski</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Lora:wght@500;700&display=swap">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
    }
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0B1F1C;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px 60px;
      text-align: center;
    }

    .check-icon {
      width: 72px;
      height: 72px;
      background: #0F766E;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
    }
    .check-icon svg {
      width: 36px;
      height: 36px;
      fill: none;
      stroke: #fff;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-family: 'Lora', serif;
      font-size: 32px;
      font-weight: 700;
      color: #fff;
      margin: 0 0 16px;
      line-height: 1.3;
    }

    .sub {
      font-size: 18px;
      color: rgba(255,255,255,0.85);
      margin: 0 0 40px;
      max-width: 520px;
    }

    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.15);
      width: 100%;
      max-width: 480px;
      margin: 0 auto 32px;
    }

    .digistore-note {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
    }

    footer {
      background: rgba(0,0,0,0.3);
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 16px;
      text-align: center;
    }
    footer a {
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      text-decoration: none;
      margin: 0 8px;
    }
    footer a:hover { color: #fff; }
  </style>
</head>
<body>

  <div class="main">
    <div class="check-icon">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
    </div>

    <h1>Vielen Dank für Deine Bestellung!</h1>
    <p class="sub">Du solltest in einigen Minuten die Bestätigung per E-Mail erhalten.</p>

    <hr class="divider">

    <p class="digistore-note">Die Abbuchung erfolgt durch Digistore24</p>
  </div>

  <footer>
    <a href="https://www.rheumafrei.de/impressum" target="_blank" rel="noopener noreferrer">Impressum</a>
    <a href="https://www.rheumafrei.de/datenschutz" target="_blank" rel="noopener noreferrer">Datenschutz</a>
    <a href="https://www.rheumafrei.de/haftungsausschluss" target="_blank" rel="noopener noreferrer">Haftungsausschluss</a>
    <a href="https://www.rheumafrei.de/agb" target="_blank" rel="noopener noreferrer">AGBs</a>
  </footer>

</body>
</html>
